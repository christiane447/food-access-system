<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="FoodApp - Fresh Fruits, Juice & Salad delivered in Kigali, Rwanda">
  <meta name="theme-color" content="#4CAF50">
  <title>FoodApp - Fresh Fruits, Juice & Salad</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Nunito:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍃</text></svg>">
</head>
<body>

  <!-- Loading Screen -->
  <div id="loading-screen">
    <div class="loader-content">
      <div class="loader-logo">🍃 FoodApp</div>
      <p style="color:rgba(255,255,255,0.8);margin-bottom:1.5rem;font-size:0.95rem">Fresh From Local Farms</p>
      <div class="loader-spinner"></div>
    </div>
  </div>

  <!-- Navbar -->
  <header id="navbar" class="navbar" role="banner"></header>

  <!-- Main Content (SPA Router Target) -->
  <main id="main-content" role="main"></main>

  <!-- Toast Notifications -->
  <div id="toast-container" class="toast-container" aria-live="polite"></div>

  <!-- Modal Overlay -->
  <div id="modal-overlay" class="modal-overlay" onclick="if(event.target===this)App.closeModal()"></div>

  <!-- Scripts -->
  <script src="js/auth.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/products.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
